# Full stack: Postgres + FastAPI BFF + static frontend (nginx)
# Usage: docker compose up --build
#
# URLs (from your machine):
#   - Frontend: http://localhost:8080
#   - API:      http://localhost:8000  (docs: /docs, health: /health)
#   - Postgres: localhost:5432  (user postgres / password apex / db apex_ledger)
#
# Override secrets: copy .env.example → .env and use `env_file` below, or:
#   docker compose run -e ANTHROPIC_API_KEY=... api

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: apex
      POSTGRES_DB: apex_ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apex_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:apex@postgres:5432/apex_ledger
      APPLICANT_REGISTRY_URL: postgresql://postgres:apex@postgres:5432/apex_ledger
      # Browser → API cross-origin (host machine ports)
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1"
    # Optional: create `.env` in repo root with ANTHROPIC_API_KEY, then add:
    # env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  ledger_pgdata:
